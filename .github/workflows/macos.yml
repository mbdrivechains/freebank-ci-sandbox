name: macos-arm64

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew install automake libtool pkg-config boost libevent berkeley-db gnu-tar
          brew list --versions boost libevent berkeley-db openssl@3 || true

      - name: Configure
        run: |
          ./autogen.sh
          BDB_PREFIX="$(brew --prefix berkeley-db)"
          BREW_PREFIX="$(brew --prefix)"
          ./configure --without-gui --with-incompatible-bdb --disable-bench \
            --with-boost="$(brew --prefix boost)" \
            CPPFLAGS="-I${BDB_PREFIX}/include -I${BREW_PREFIX}/include" \
            LDFLAGS="-L${BDB_PREFIX}/lib -L${BREW_PREFIX}/lib"

      - name: Dump config.log on configure failure
        if: failure()
        run: tail -150 config.log

      - name: Build
        run: make -j3

      - name: Version smoke test
        run: |
          ./src/freebankd --version | head -3
          ./src/freebank-cli --version | head -1

      - name: Unit test suite
        run: make check

      - name: Dump test log on failure
        if: failure()
        run: tail -200 src/test-suite.log 2>/dev/null || true

      - name: Regtest boot smoke test
        run: |
          mkdir -p /tmp/fbsmoke
          ./src/freebankd -regtest -daemon -datadir=/tmp/fbsmoke -rpcuser=smoke -rpcpassword=smoke
          for i in $(seq 1 30); do
            ./src/freebank-cli -regtest -datadir=/tmp/fbsmoke -rpcuser=smoke -rpcpassword=smoke getblockchaininfo >/dev/null 2>&1 && break
            sleep 1
          done
          ./src/freebank-cli -regtest -datadir=/tmp/fbsmoke -rpcuser=smoke -rpcpassword=smoke getblockchaininfo | head -5
          ./src/freebank-cli -regtest -datadir=/tmp/fbsmoke -rpcuser=smoke -rpcpassword=smoke stop

      - name: Package tarball
        run: |
          VER=$(./src/freebank-cli --version | head -1 | sed -E 's/.*v([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          mkdir -p dist/freebank/bin
          cp src/freebankd src/freebank-cli src/freebank-tx dist/freebank/bin/
          strip -S dist/freebank/bin/*
          cp COPYING README.md dist/freebank/
          gtar -C dist --sort=name --owner=0 --group=0 --numeric-owner \
            --mtime='2026-07-20 10:00' -cf "freebank-${VER}-arm64-apple-darwin.tar" freebank
          gzip -n "freebank-${VER}-arm64-apple-darwin.tar"
          shasum -a 256 freebank-${VER}-arm64-apple-darwin.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: freebank-arm64-apple-darwin
          path: freebank-*-arm64-apple-darwin.tar.gz
